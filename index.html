<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#131f24">
  <title>Абитура · тренажёр для поступающих в вуз</title>
  <script>
    /* применяем тему до отрисовки, чтобы не мигало белым */
    (function () {
      try {
        var p = JSON.parse(localStorage.getItem('altgtu-trainer') || '{}');
        var t = (p.settings && p.settings.theme) || 'auto';
        if (t === 'auto') t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.dataset.theme = t;
        document.documentElement.dataset.palette = (p.settings && p.settings.palette) || 'classic';
        document.documentElement.dataset.bg = (p.settings && p.settings.bg) || 'classic';
      } catch (e) { document.documentElement.dataset.theme = 'light'; }
    })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app"></div>
  <canvas id="confetti"></canvas>
  <div id="toasts"></div>
  <!-- данные курсов -->
  <script src="data_math.js"></script>
  <script src="data_inf.js"></script>
  <script src="data_rus.js"></script>
  <script src="glossary.js"></script>
  <!-- движок и экраны -->
  <script src="icons.js"></script>
  <script src="data_morse.js"></script>
  <script src="core.js"></script>
  <script src="screens.js"></script>
  <script src="exam.js"></script>
  <script src="stats.js"></script>
  <script src="ai.js"></script>
</body>
</html>
